<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient: deep editor dark -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>

    <!-- Blue accent for selected/highlight card -->
    <linearGradient id="cardAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e6be6;stop-opacity:1" />
    </linearGradient>

    <!-- Thumbnail gradient: warm render feel -->
    <linearGradient id="thumbGrad1" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c47f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="thumbGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ab8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7fc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="thumbGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85e0a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3abc6a;stop-opacity:1" />
    </linearGradient>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4f8ef7" flood-opacity="0.7"/>
    </filter>

    <!-- Clip for thumbnail rounded corners -->
    <clipPath id="clip1"><rect x="10" y="38" width="32" height="28" rx="3"/></clipPath>
    <clipPath id="clip2"><rect x="48" y="38" width="32" height="28" rx="3"/></clipPath>
    <clipPath id="clip3"><rect x="86" y="38" width="32" height="28" rx="3"/></clipPath>
    <clipPath id="clip4"><rect x="10" y="80" width="32" height="28" rx="3"/></clipPath>
    <clipPath id="clip5"><rect x="48" y="80" width="32" height="28" rx="3"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="12" fill="url(#bgGrad)"/>

  <!-- Top bar strip -->
  <rect x="8" y="8" width="112" height="22" rx="5" fill="#252a3d"/>
  <!-- Folder icon in top bar -->
  <rect x="14" y="13" width="14" height="10" rx="2" fill="#4f8ef7" opacity="0.9"/>
  <rect x="14" y="11" width="7" height="4" rx="1.5" fill="#4f8ef7" opacity="0.9"/>
  <!-- Search bar hint -->
  <rect x="34" y="14" width="48" height="7" rx="3.5" fill="#1a1f30"/>
  <circle cx="38" cy="17.5" r="2.5" fill="none" stroke="#555e7a" stroke-width="1.2"/>
  <line x1="40" y1="19.5" x2="42" y2="21.5" stroke="#555e7a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Toggle button -->
  <rect x="88" y="14" width="14" height="7" rx="3.5" fill="#2e3550"/>
  <rect x="90" y="16" width="10" height="1.2" rx="0.6" fill="#6070a0"/>
  <rect x="90" y="18" width="7" height="1.2" rx="0.6" fill="#6070a0"/>
  <!-- Refresh -->
  <path d="M107 13 a5 5 0 1 1 -3 8.7" fill="none" stroke="#6070a0" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="104,21.5 107,24 107,19" fill="#6070a0"/>

  <!-- ── Card row 1 ── -->

  <!-- Card 1 — highlighted/selected (blue glow) -->
  <rect x="10" y="34" width="32" height="38" rx="4" fill="#1e2d52" filter="url(#glowBlue)" stroke="#4f8ef7" stroke-width="1.5"/>
  <!-- thumbnail -->
  <rect x="10" y="38" width="32" height="28" rx="3" fill="#0d1528" clip-path="url(#clip1)"/>
  <!-- 3D cube shape in thumbnail 1 -->
  <g clip-path="url(#clip1)" opacity="0.95">
    <rect x="10" y="38" width="32" height="28" fill="#0f1a2e"/>
    <!-- cube faces -->
    <polygon points="26,41 36,46 36,56 26,61 16,56 16,46" fill="url(#cardAccent)" opacity="0.85"/>
    <polygon points="26,41 36,46 36,56 26,51" fill="#2e6be6" opacity="0.6"/>
    <polygon points="26,41 16,46 16,56 26,51" fill="#7aaef7" opacity="0.4"/>
  </g>
  <!-- label bar -->
  <rect x="12" y="69" width="28" height="1.5" rx="0.75" fill="#4f8ef7" opacity="0.6"/>

  <!-- Card 2 -->
  <rect x="48" y="34" width="32" height="38" rx="4" fill="#1e2235" filter="url(#cardShadow)"/>
  <rect x="48" y="38" width="32" height="28" rx="3" fill="#0d1120" clip-path="url(#clip2)"/>
  <g clip-path="url(#clip2)">
    <rect x="48" y="38" width="32" height="28" fill="#12150e"/>
    <!-- coin / cylinder shape -->
    <ellipse cx="64" cy="52" rx="11" ry="4" fill="url(#thumbGrad1)" opacity="0.9"/>
    <rect x="53" y="48" width="22" height="8" fill="#c47f3a" opacity="0.7"/>
    <ellipse cx="64" cy="48" rx="11" ry="4" fill="url(#thumbGrad1)"/>
  </g>
  <rect x="50" y="69" width="22" height="1.5" rx="0.75" fill="#555e7a" opacity="0.5"/>

  <!-- Card 3 -->
  <rect x="86" y="34" width="32" height="38" rx="4" fill="#1e2235" filter="url(#cardShadow)"/>
  <rect x="86" y="38" width="32" height="28" rx="3" fill="#0d1120" clip-path="url(#clip3)"/>
  <g clip-path="url(#clip3)">
    <rect x="86" y="38" width="32" height="28" fill="#0e1512"/>
    <!-- tree / cone shape -->
    <polygon points="102,40 112,62 92,62" fill="url(#thumbGrad3)" opacity="0.9"/>
    <rect x="99" y="62" width="6" height="4" fill="#2a7a45" opacity="0.8"/>
  </g>
  <rect x="88" y="69" width="20" height="1.5" rx="0.75" fill="#555e7a" opacity="0.5"/>

  <!-- ── Card row 2 ── -->

  <!-- Card 4 -->
  <rect x="10" y="76" width="32" height="38" rx="4" fill="#1e2235" filter="url(#cardShadow)"/>
  <rect x="10" y="80" width="32" height="28" rx="3" fill="#0d1120" clip-path="url(#clip4)"/>
  <g clip-path="url(#clip4)">
    <rect x="10" y="80" width="32" height="28" fill="#150d0e"/>
    <!-- sphere -->
    <circle cx="26" cy="94" r="10" fill="url(#thumbGrad2)" opacity="0.9"/>
    <ellipse cx="23" cy="90" rx="3" ry="2" fill="white" opacity="0.2"/>
  </g>
  <rect x="12" y="111" width="18" height="1.5" rx="0.75" fill="#555e7a" opacity="0.5"/>

  <!-- Card 5 -->
  <rect x="48" y="76" width="32" height="38" rx="4" fill="#1e2235" filter="url(#cardShadow)"/>
  <rect x="48" y="80" width="32" height="28" rx="3" fill="#0d1120" clip-path="url(#clip5)"/>
  <g clip-path="url(#clip5)">
    <rect x="48" y="80" width="32" height="28" fill="#100f15"/>
    <!-- gem / diamond -->
    <polygon points="64,82 74,90 64,104 54,90" fill="url(#thumbGrad1)" opacity="0.85"/>
    <polygon points="64,82 74,90 64,90" fill="white" opacity="0.2"/>
  </g>
  <rect x="50" y="111" width="24" height="1.5" rx="0.75" fill="#555e7a" opacity="0.5"/>

  <!-- Drag arrow — showing a card being dragged out -->
  <g transform="translate(86, 80)" opacity="0.95">
    <!-- dragged card ghost -->
    <rect x="0" y="0" width="32" height="38" rx="4" fill="#1e2d52" opacity="0.5" stroke="#4f8ef7" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- arrow pointing right-up toward viewport -->
    <line x1="36" y1="19" x2="50" y2="5" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
    <polygon points="50,5 43,7 48,12" fill="#4f8ef7"/>
  </g>

</svg>
